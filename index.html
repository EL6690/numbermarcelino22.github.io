<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Number Checker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
}
button {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #22c55e;
    font-weight: bold;
}
.result {
    margin-top: 15px;
    background: #020617;
    padding: 15px;
    border-radius: 8px;
    text-align: left;
}
.valid { color: #22c55e; }
.invalid { color: #ef4444; }
</style>

</head>
<body>

<div class="container">
    <h2>Scientific Number Checker</h2>

    <input type="text" id="inputNumber" placeholder="Contoh: 3e3 atau 3×10^3">

    <button onclick="checkScientific()">Cek & Konversi</button>

    <div class="result" id="result">Hasil akan muncul di sini</div>
</div>

<script>
function toSuperscript(num) {
    const map = {
        "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴",
        "5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹","-":"⁻"
    };
    return num.toString().split("").map(x => map[x] || x).join("");
}

function checkScientific() {
    let input = document.getElementById("inputNumber").value.trim();

    if (input === "") {
        alert("Masukkan angka!");
        return;
    }

    let resultBox = document.getElementById("result");

    let patternE = /^[+-]?\d+(\.\d+)?e[+-]?\d+$/i;
    let patternX = /^[+-]?\d+(\.\d+)?\s*[x×]\s*10\^[+-]?\d+$/i;

    let value, base, exponent;

    if (patternE.test(input)) {
        value = Number(input);

        let parts = input.toLowerCase().split("e");
        base = parseFloat(parts[0]);
        exponent = parseInt(parts[1]);

    } else if (patternX.test(input)) {
        let parts = input.split(/[x×]/);
        base = parseFloat(parts[0]);
        exponent = parseInt(parts[1].replace("10^", ""));

        value = base * Math.pow(10, exponent);

    } else {
        resultBox.innerHTML = "<span class='invalid'>✖ Bukan Scientific Notation</span>";
        return;
    }

    let scientificDisplay = base + " × 10" + toSuperscript(exponent);
    let eFormat = base + "e" + exponent;

    resultBox.innerHTML = `
        <span class='valid'>✔ VALID Scientific Notation</span><br><br>
        🔢 Nilai Desimal: <b>${value}</b><br>
        📘 Format e: <b>${eFormat}</b><br>
        📗 Format ilmiah: <b>${scientificDisplay}</b>
    `;
}
</script>

</body>
</html>
