<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Number Checker</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Tombol About */
.about-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #0ea5e9;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* Container utama */
.container {
    background: #f1f5f9;
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    text-align: center;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 8px;
    border: 2px solid #0ea5e9;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #0ea5e9;
    color: white;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 20px;
    font-weight: bold;
    color: #064e3b;
}

/* Popup */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #e5e7eb;
    padding: 25px;
    border-radius: 15px;
    width: 300px;
    text-align: center; /* ⬅️ INI YANG BUAT RATA TENGAH */
}

.close-btn {
    margin-top: 15px;
}
</style>

</head>
<body>

<!-- Tombol About -->
<button class="about-btn" onclick="openAbout()">About</button>

<!-- Container -->
<div class="container">
    <h2>Scientific Number Checker</h2>

    <input type="text" id="inputNumber" placeholder="Contoh: 3e3 atau 3×10^3">

    <button onclick="checkScientific()">Check</button>

    <div class="result" id="result"></div>
</div>

<!-- Popup About -->
<div class="modal" id="aboutModal">
    <div class="modal-content">
        <h3>About</h3>
        <p><b>Nama:</b> Marcelino Winowoda</p>
        <p><b>NIM:</b> 221011060047</p>

        <button class="close-btn" onclick="closeAbout()">Tutup</button>
    </div>
</div>

<script>
function openAbout() {
    document.getElementById("aboutModal").style.display = "flex";
}

function closeAbout() {
    document.getElementById("aboutModal").style.display = "none";
}

function checkScientific() {
    let input = document.getElementById("inputNumber").value.trim();

    let patternE = /^[+-]?\d+(\.\d+)?e[+-]?\d+$/i;
    let patternX = /^[+-]?\d+(\.\d+)?\s*[x×]\s*10\^[+-]?\d+$/i;

    let resultBox = document.getElementById("result");

    if (patternE.test(input) || patternX.test(input)) {
        resultBox.innerHTML = "✔ Yes, it is a scientific number";
    } else {
        resultBox.innerHTML = "✖ No, it is not a scientific number";
    }
}
</script>

</body>
</html>
